version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ipl_postgres
    restart: always
    environment:
      POSTGRES_USER: ipl_user
      POSTGRES_PASSWORD: ipl_pass
      POSTGRES_DB: ipl_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ipl_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipl_backend
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend/app/models:/workspace/app/models
      - ./backend/mlruns:/workspace/mlruns
      - ./backend/logs:/workspace/logs
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ipl_user:ipl_pass@postgres:5432/ipl_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=9a1f28b3c4d5e6f7a8b9c0d1e2f3a4b5
      - MLFLOW_TRACKING_URI=./mlruns
      - LOG_LEVEL=INFO
      - DATASET_URL=https://cricsheet.org/downloads/ipl_male_csv2.zip
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipl_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
